---
# ============================================================
# SAMPLE APP — LOG GENERATOR
# Convention used throughout:
#   app name  : log-generator
#   namespace : sample-app
#   pattern   : <app>-<resource-type>
# ============================================================

# 1. NAMESPACE
apiVersion: v1
kind: Namespace
metadata:
  name: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: sample-app

---
# 2. DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator-deployment        
  namespace: sample-app
  labels:
    app.kubernetes.io/name: log-generator
    app.kubernetes.io/component: log-generator
    app.kubernetes.io/part-of: sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: log-generator
      app.kubernetes.io/component: log-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: log-generator
        app.kubernetes.io/component: log-generator
        app.kubernetes.io/part-of: sample-app
      annotations:
        fluentbit.io/parser: json
    spec:
      containers:
        # Container 1: nginx — serves HTTP traffic
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

        # Container 2: log-generator — emits structured JSON logs every second
        - name: log-generator
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              LEVELS="INFO WARN ERROR DEBUG"
              SERVICES="auth payment inventory shipping"
              i=0
              while true; do
                LEVEL=$(echo $LEVELS | tr ' ' '\n' | sed -n "$((RANDOM % 4 + 1))p")
                SERVICE=$(echo $SERVICES | tr ' ' '\n' | sed -n "$((RANDOM % 4 + 1))p")
                printf '{"timestamp":"%s","level":"%s","service":"%s","message":"Request processed","request_id":"req-%05d","latency_ms":%d}\n' \
                  "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                  "$LEVEL" \
                  "$SERVICE" \
                  "$i" \
                  "$((RANDOM % 500 + 10))"
                i=$((i+1))
                sleep 1
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

---
# 3. SERVICE
apiVersion: v1
kind: Service
metadata:
  name: log-generator-svc               
  namespace: sample-app
  labels:
    app.kubernetes.io/name: log-generator
    app.kubernetes.io/component: log-generator
    app.kubernetes.io/part-of: sample-app
spec:
  selector:
    app.kubernetes.io/name: log-generator
    app.kubernetes.io/component: log-generator
  ports:
    - name: http
      port: 80
      targetPort: http

---
# INGRESS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: log-generator-ingress          
  namespace: sample-app
  labels:
    app.kubernetes.io/name: log-generator
    app.kubernetes.io/part-of: sample-app
spec:
  ingressClassName: nginx
  rules:
    - host: app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: log-generator-svc 
                port:
                  number: 80